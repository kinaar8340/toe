name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-xdist hypothesis pydantic types-PyYAML torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --cov=conduit --cov-report=xml --cov-report=term-missing -n auto

      - name: Run mypy type checking
        run: |
          python -m mypy src/ tests/ --config-file pyproject.toml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
